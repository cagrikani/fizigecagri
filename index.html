<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benim Sitem</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #f4efe6, #d8e2dc);
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(255,255,255,0.85);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      max-width: 600px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 42px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Merhaba</h1>
    <p>Bu benim ilk canlı sitem.</p>
    <p>Burayı zamanla portföy, blog veya tanıtım sitesine çevireceğim.</p>
  </div>
</body>
</html>
